			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Type a script or drag a script file from your workspace to insert its path.\n# Strip invalid architectures (e.g. arm64e) from frameworks in the app bundle\nAPP_FRAMEWORKS_DIR=\"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Frameworks\"\n\nif [ -d \"$APP_FRAMEWORKS_DIR\" ]; then\n    find \"$APP_FRAMEWORKS_DIR\" -name \"*.framework\" -type d | while read -r framework; do\n        FRAMEWORK_NAME=$(basename \"$framework\" .framework)\n        FRAMEWORK_EXECUTABLE=\"$framework/$FRAMEWORK_NAME\"\n\n        if [ -f \"$FRAMEWORK_EXECUTABLE\" ]; then\n            # Check if the binary contains arm64e\n            if lipo -info \"$FRAMEWORK_EXECUTABLE\" | grep -q \"arm64e\"; then\n                echo \"Removing arm64e slice from $FRAMEWORK_NAME...\"\n                \n                # Remove the arm64e slice and save to a temporary file\n                lipo -remove arm64e \"$FRAMEWORK_EXECUTABLE\" -o \"$FRAMEWORK_EXECUTABLE.stripped\"\n                \n                # Replace the original with the stripped version\n                if [ -f \"$FRAMEWORK_EXECUTABLE.stripped\" ]; then\n                    rm \"$FRAMEWORK_EXECUTABLE\"\n                    mv \"$FRAMEWORK_EXECUTABLE.stripped\" \"$FRAMEWORK_EXECUTABLE\"\n                    \n                    # Re-sign the framework (required after modifying the binary)\n                    if [ -n \"$EXPANDED_CODE_SIGN_IDENTITY\" ]; then\n                        echo \"Re-signing $FRAMEWORK_NAME...\"\n                        codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" --preserve-metadata=identifier,entitlements \"$framework\"\n                    fi\n                fi\n            fi\n        fi\n    done\nfi\n";
